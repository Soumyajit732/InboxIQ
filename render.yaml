# Reference blueprint for InboxIQ's backend service on Render.
#
# This is NOT meant to be synced blindly as a new Blueprint -- doing so would spin up
# a brand-new service with a new onrender.com URL, breaking the redirect URI already
# registered with your Google OAuth client. Use this as a checklist for the settings
# on the existing `inboxiq-backend-10oo` service instead.

services:
  - type: web
    name: inboxiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_ENV
        value: production
    disk:
      name: app-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1 # requires a paid plan; without it, inboxiq.db (tasks + sessions) resets on every deploy/restart
